<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeong Hyeri | Game Developer</title>
    <style>
        /* 기본 여백 제거 및 화면 꽉 채우기 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f4; /* 눈이 편안한 아주 밝은 회색 */
            overflow: hidden; /* 이중 스크롤 방지 */
            display: flex;
            flex-direction: column;
        }

        /* 상단 공지 바 (개발 중임을 알리는 영역) */
        .status-bar {
            background-color: #1a1a1a; /* 다크 차콜 색상으로 명함과 톤앤매너 맞춤 */
            color: #ffffff;
            padding: 10px 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #eeeeee;
        }

        /* 깜빡이는 커서 효과로 코딩 중인 개발자 느낌 주기 */
        .typing-indicator::after {
            content: '_';
            animation: blink 1s step-start infinite;
            color: #00ffcc; /* 포인트 컬러 */
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .slogan {
            font-family: monospace; /* 개발자스러운 폰트 */
            color: #888;
            font-size: 12px;
        }

        /* PDF 뷰어 영역 (남은 화면 100% 채우기) */
        .pdf-wrapper {
            flex-grow: 1; /* 상단 바를 제외한 나머지 공간 모두 차지 */
            width: 100%;
            background-color: #e5e5e5;
        }
        
        <iframe 
            src="./portfolio.pdf#toolbar=0" 
            allow="autoplay">
        </iframe>

        /* 모바일 화면 대응 */
        @media (max-width: 600px) {
            .status-bar {
                flex-direction: column;
                gap: 5px;
                text-align: center;
                font-size: 12px;
            }
            .slogan {
                display: none; /* 모바일에서는 슬로건 숨겨서 깔끔하게 */
            }
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="typing-indicator">
            > 웹사이트 정식 버전은 현재 개발 중입니다. 먼저 PDF 포트폴리오를 확인해 주세요.
        </div>
        <div class="slogan">
            EVERY STORY IS A PLAYABLE STORY
        </div>
    </div>

    <div class="pdf-wrapper">
        <iframe 
            src="https://drive.google.com/file/d/1uCtoB_XiRHcHXvhOWwYFPum3aERnk63r/preview" 
            allow="autoplay">
        </iframe>
    </div>

</body>
</html>
