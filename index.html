<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeong Hyeri | Game Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f4;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #eeeeee;
        }
        .typing-indicator::after {
            content: '_';
            animation: blink 1s step-start infinite;
            color: #00ffcc;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .slogan {
            font-family: monospace;
            color: #888;
            font-size: 12px;
        }
        .pdf-wrapper {
            flex-grow: 1;
            width: 100%;
            background-color: #e5e5e5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        @media (max-width: 600px) {
            .status-bar {
                flex-direction: column;
                gap: 5px;
                text-align: center;
                font-size: 12px;
            }
            .slogan {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="typing-indicator">
            > 웹사이트 정식 버전은 현재 개발 중입니다. 먼저 PDF 포트폴리오를 확인해 주세요.
        </div>
        <div class="slogan">
            EVERY STORY IS A PLAYABLE STORY
        </div>
    </div>
    <div class="pdf-wrapper">
        <iframe 
            src="./portfolio.pdf#toolbar=0" 
            allow="autoplay">
        </iframe>
    </div>
</body>
</html>
