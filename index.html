<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeong Hyeri | Game Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #333333; /* 기본 배경 어둡게 */
            overflow: hidden; /* PC에서는 전체 스크롤 방지 */
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #eeeeee; /* 은은한 회색 선으로 복구 */
            z-index: 10;
        }
        .typing-indicator::after {
            content: '_';
            animation: blink 1s step-start infinite;
            color: #00ffcc; /* 커서 색상만 포인트로 유지 */
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .slogan {
            font-family: monospace;
            color: #888;
            font-size: 12px;
        }

        /* 데스크탑용 PDF 영역 (기본 활성화) */
        .pdf-wrapper {
            flex-grow: 1;
            width: 100%;
            background-color: #e5e5e5;
            display: block; /* 보이기 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 모바일용 이미지 스크롤 영역 (기본 숨김) */
        .portfolio-content {
            display: none; /* PC에서는 숨기기 */
            flex-grow: 1;
            width: 100%;
            overflow-y: auto;
            background-color: #333333;
            padding: 20px 0;
        }
        .portfolio-content img {
            width: 100%;
            display: block;
            margin-bottom: 10px;
        }

        /* 📱 반응형 분기점: 화면 가로폭이 768px 이하(모바일/태블릿)일 때 */
        @media (max-width: 768px) {
            .status-bar {
                flex-direction: column;
                gap: 5px;
                text-align: center;
                font-size: 12px;
            }
            .slogan {
                display: none;
            }
            body, html {
                overflow: auto; /* 모바일에서는 전체 스크롤 허용 */
            }
            /* PDF 숨기고 이미지를 보여줌 */
            .pdf-wrapper {
                display: none; 
            }
            .portfolio-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="typing-indicator">
            > 웹사이트 정식 버전은 현재 개발 중입니다. 먼저 포트폴리오를 확인해 주세요.
        </div>
        <div class="slogan">
            EVERY STORY IS A PLAYABLE STORY
        </div>
    </div>
    
    <div class="pdf-wrapper">
        <iframe src="./portfolio.pdf#toolbar=0" allow="autoplay"></iframe>
    </div>

    <div class="portfolio-content">
        <img src="./1.png" alt="1p">
        <img src="./2.png" alt="2p">
        <img src="./3.png" alt="3p">
        <img src="./4.png" alt="4p">
        <img src="./5.png" alt="5p">
        <img src="./6.png" alt="6p">
        <img src="./7.png" alt="7p">
        <img src="./8.png" alt="8p">
        <img src="./9.png" alt="9p">
        <img src="./10.png" alt="10p">
        <img src="./11.png" alt="11p">
        <img src="./12.png" alt="12p">
        <img src="./13.png" alt="13p">
    </div>
</body>
</html>
